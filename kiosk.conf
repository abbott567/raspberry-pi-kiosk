# Shared kiosk configuration, read by BOTH check-wifi.sh (the Wi-Fi watchdog)
# and demo/server.js (the kiosk web server) so the two can never drift apart.
#
# Format is plain KEY=value with no quotes, spaces, or shell expansion, so the
# same file works as a shell `source` file (check-wifi.sh) and a systemd
# EnvironmentFile= (node-server.service).
#
# Install: sudo cp kiosk.conf /etc/kiosk.conf

# Endpoint both sides ping to decide whether the internet is reachable. The
# watchdog and the page MUST agree on this, or the offline overlay and the
# reboot countdown end up measuring different things.
HEALTH_URL=https://www.google.com/generate_204

# Consecutive failed checks before the watchdog reboots the Pi. Also the
# denominator the page shows as "Retrying… N/5".
MAX_FAILURES=5

# File the watchdog writes its consecutive-failure count to; the server reads it
# back out for /health. Lives in /tmp so it is wiped on reboot.
FAIL_FILE=/tmp/check-wifi-failures

# How long the server's health probe waits before giving up, in milliseconds.
HEALTH_TIMEOUT=4000
